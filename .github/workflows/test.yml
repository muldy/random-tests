name: Test Project
on:
    push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - name: Get the code
          uses: actions/checkout@v7
        - name: Install NodeJS
          uses: action/setup-node@6
          with:
            node-version: 18
        - name: Install dependencies
          run: npm ci
        - name: Run tests
          run: npm tests


